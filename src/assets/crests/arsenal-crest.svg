<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-label="Arsenal FC">
  <defs>
    <radialGradient id="arsenal-grad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#9b0000"/>
    </radialGradient>
  </defs>
  <circle cx="40" cy="40" r="38" fill="url(#arsenal-grad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Cannon barrel -->
  <rect x="14" y="35" width="40" height="10" rx="5" fill="#ffffff"/>
  <!-- Cannon muzzle -->
  <rect x="51" y="37" width="12" height="6" rx="3" fill="#ffffff"/>
  <!-- Wheel left -->
  <circle cx="21" cy="47" r="7" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Wheel right -->
  <circle cx="45" cy="47" r="7" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- AFC text -->
  <text x="40" y="30" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="800"
        font-family="Inter, system-ui, sans-serif" letter-spacing="1">AFC</text>
</svg>
