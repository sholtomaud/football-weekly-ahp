      <stop offset="0%" stop-color="#1d3278"/>
      <stop offset="100%" stop-color="#0a1840"/>
    </radialGradient>
  </defs>
  <circle cx="40" cy="40" r="38" fill="url(#spurs-grad)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Cockerel body -->
  <ellipse cx="40" cy="50" rx="14" ry="10" fill="#ffffff"/>
  <!-- Cockerel head -->
  <circle cx="54" cy="30" r="9" fill="#ffffff"/>
