  <!-- Eye -->
  <circle cx="57" cy="28" r="1.8" fill="#132257"/>
  <!-- Tail feathers -->
  <path d="M27,46 Q19,36 22,28 Q26,38 30,42" fill="#ffffff"/>
  <!-- Legs -->
